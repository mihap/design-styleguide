<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{guideName}} Demo</title>
  <link rel="stylesheet" href="{{stylesheet}}">
</head>
<body class="min-h-screen bg-base-100 text-base-content antialiased">
  <div class="min-h-screen lg:flex">
    <aside class="border-r border-base-300 bg-base-200/70 lg:sticky lg:top-0 lg:h-screen lg:w-72 lg:shrink-0 lg:overflow-y-auto">
      <div class="p-6">
        <p class="text-xs font-semibold uppercase tracking-wider text-base-content/60">Design guide demo</p>
        <h1 class="mt-2 text-xl font-semibold tracking-tight">{{guideName}}</h1>
      </div>
      <nav class="px-3 pb-6" aria-label="Demo sections">
        {{sidebarItems}}
      </nav>
    </aside>

    <main class="mx-auto w-full max-w-7xl px-6 py-8 lg:px-10">
      <header class="mb-10 rounded-2xl border border-base-300 bg-base-100 p-8 shadow-xs">
        <p class="text-sm font-medium text-primary">{{version}}</p>
        <h2 class="mt-3 text-4xl font-semibold tracking-tight">{{guideName}}</h2>
        <p class="mt-4 max-w-3xl text-base leading-7 text-base-content/70">{{description}}</p>
      </header>

      <div class="space-y-12">
        {{sections}}
      </div>
    </main>
  </div>
</body>
</html>
