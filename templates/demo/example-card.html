<article class="rounded-xl border border-base-300 bg-base-100 p-4" data-example-type="{{exampleType}}">
  <div class="mb-4">
    <h3 class="text-base font-semibold">{{exampleTitle}}</h3>
    <p class="mt-1 text-sm leading-6 text-base-content/65">{{exampleDescription}}</p>
  </div>
  <div class="rounded-lg border border-base-300 bg-base-200/50 p-4">
    {{exampleBody}}
  </div>
</article>
