<!doctype html>
<html lang="en">
<head><title>Tailwind Export Fixture</title></head>
<body class="bg-base-100 text-base-content font-sans antialiased">
  <main class="mx-auto max-w-7xl space-y-8 p-6">
    <section class="rounded-2xl border border-base-300 bg-base-100 p-6 shadow-xs">
      <h1 class="text-4xl font-semibold tracking-tight text-base-content">Tailwind export fixture</h1>
      <p class="mt-3 text-base leading-relaxed text-base-content/70">Generated utility coverage for tokens and states.</p>
      <div class="mt-6 flex flex-wrap gap-3">
        <button class="rounded-md bg-primary px-4 py-2 text-sm font-semibold text-primary-content shadow-xs hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-base-100">Primary</button>
        <button class="rounded-md border border-secondary bg-base-100 px-4 py-2 text-sm font-semibold text-secondary hover:bg-base-200">Secondary</button>
        <button class="rounded-md bg-error px-4 py-2 text-sm font-semibold text-error-content">Destructive</button>
      </div>
      <div class="mt-4 flex items-center gap-3">
        <span class="mp-icon-xs rounded-full bg-primary"></span>
        <span class="mp-icon-sm rounded-full bg-secondary"></span>
        <span class="mp-icon-md rounded-full bg-accent"></span>
        <span class="mp-icon-lg rounded-full bg-success"></span>
      </div>
      <div class="mt-4 space-y-1">
        <p class="font-regular leading-tight tracking-tighter text-sm">Regular tight tracking sample.</p>
        <p class="font-medium leading-snug tracking-normal text-sm">Medium snug sample.</p>
        <p class="font-semibold leading-loose tracking-wider text-sm">Semibold loose sample.</p>
      </div>
    </section>
    <section class="grid gap-4 md:grid-cols-4">
      <div class="rounded-lg bg-info p-4 text-info-content">Info</div>
      <div class="rounded-lg bg-success p-4 text-success-content">Success</div>
      <div class="rounded-lg bg-warning p-4 text-warning-content">Warning</div>
      <div class="rounded-lg bg-error p-4 text-error-content">Error</div>
    </section>
  </main>
</body>
</html>
